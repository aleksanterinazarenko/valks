        <script>
            const letters = {

                "–Х": "E",

                "–Ю": "O",
                "–Я": "P",
                "–†": "R",
                "–°": "S",
                "–Ґ": "T",
                "–£": "U",
                "–§": "F",
                "–•": "H",
                "–¶": "C",
                "–І": "ƒМ",
                "–®": "≈†",
                "–©": "≈†ƒН",

                "–ї": "l",
                "–Љ": "m",
                "–љ": "n",
                "–Њ": "o",
                "–њ": "p",
                "—А": "r",
                "—Б": "s",
                "—В": "t",
                "—Г": "u",
                "—Д": "f",
                "—Е": "h",
                "—Ж": "c",
                "—З": "ƒН",
                "—И": "≈°",
                "—Й": "≈°ƒН",
                "—М": "",
                "—К": "",
                "—Л": "√ѓ",
                "—Н": "√Ђ",
                "—О": "u",
                "—П": "a",
                "‘Щ": "√§",
                "”Х": "√§",
                "”У": "√§",
                "—£": "e",
                "“•": "n",
                "—Ц": "i",
                "—≥": "f"
            };

            const palatals = {
                "–Ф": "ƒО",
                "–Ч": "≈є",
                "–Ы": "ƒљ",
                "–Э": "≈З",
                "–†": "≈Ш",
                "–°": "≈Ъ",
                "–Ґ": "≈§",
                "–¶": "ƒЖ",
                "–і": "ƒП",
                "–Ј": "≈Ї",
                "–ї": "ƒЊ",
                "–љ": "≈И",
                "—А": "≈Щ",
                "—Б": "≈Ы",
                "—В": "≈•",
                "—Ж": "ƒЗ"
            };

            const vowels = "–Р–Ю–£–Ђ–≠–ѓ‘Ш–Б–Ѓ–Ш–Х–™–ђ–∞–Њ—Г—Л—Н—П‘Щ—С—О–Є–µ—К—М";
            const front = "–Х–Б–Ш–Ѓ–ѓ–µ—С–Є—О—П";
            const nondentals = "–С–Т–У–Ц–Ъ–Я–Ь–®–±–≤–≥–ґ–Ї–њ–Љ—И";

            function transliterate(text) {
                const spaceBefore = text.startsWith(' ');
                const spaceAfter = text.endsWith(' ');
                text = " " + text + " ";

                for (const [key, value] of Object.entries(palatals)) {
                    const regexVowel = new RegExp(key + '—М([–∞–µ—С–Є–Њ—Г—Л—Н—О—П–Р–Х–Б–Ш–Ю–£–Ђ–≠–Ѓ–ѓ])', 'g');
                    text = text.replace(regexVowel, value + '$1');

                text = text.replace(/([–Ш–Ж])([–Є—Ц–Ш–Ж])/g, 'J$2');

                text = text.replace(/([–Р–Х–Б–Ш–Ю–£–Ђ–≠–Ѓ–ѓ–Ж–∞–µ—С–Є–Њ—Г—Л—Н—О—П—Ц])–≤(?=[–±–≥–і–ґ–Ј–Ї–ї–Љ–љ–њ—А—Б—В—Д—Е—Ж—З—И—Й—К–С–У–Ф–Ц–Ч–Ъ–Ы–Ь–Э–Я–†–°–Ґ–§–•–¶–І–®–©–™])/g,
                    '$1v');
                text = text.replace(/([–Р–Х–Б–Ш–Ю–£–Ђ–≠–Ѓ–ѓ–Ж–∞–µ—С–Є–Њ—Г—Л—Н—О—П—Ц])–≤(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])/g, '$1v$2');
                text = text.replace(/([–і–Ј–ї–љ—А—Б—Ж–Ф–Ч–Ы–Э–†–°–¶])([—В–Ґ])([—М–ђ])(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])/g, '$1—М$2$4');
                text = text.replace(/([–і–Ј–ї–љ—А—Б—Ж–Ф–Ч–Ы–Э–†–°–¶])([—В–Ґ])([—М–ђ])([–±–≥–і–ґ–Ј–Ї–ї–Љ–љ–њ—А—Б—В—Д—Е—Ж—З—И—Й—К–С–У–Ф–Ц–Ч–Ъ–Ы–Ь–Э–Я–†–°–Ґ–§–•–¶–І–®–©–™])/g,
                    '$1—М$2$4');
                text = text.replace(/(?<![–∞–Њ—Г—П—С—О–Р–Ю–£–ѓ–Б–Ѓ])([—В–Ґ])([—М–ђ])(?=\s|[.,!?;:()\[\]{}"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-]|$)/g, '$1');

                text = text.replace(/([–і–Ј–ї–љ—А—В—Ж–Ф–Ч–Ы–Э–†–Ґ–¶])—М(?=[–і–Ј–ї–љ—А—Б—В—Е—Ж]+[–µ—С–Є—П—Ц—М—£])/g, '$1');
                text = text.replace(/([–і–Ј–ї–љ—А—В—Ж–Ф–Ч–Ы–Э–†–Ґ–¶])—М(?=[–і–Ј–ї–љ—А—Б—В—Е—Ж]+[—Н—Л])/g, '$1');
                text = text.replace(/([–і–Ј–ї–љ—А—В—Ж–Ф–Ч–Ы–Э–†–Ґ–¶])—М(?=[–µ—С–Є—О—П—Ц—М])/g, '$1j');
                text = text.replace(/([–і–Ј–ї–љ—А—В—Ж–Ф–Ч–Ы–Э–†–Ґ–¶])—М([—З–І])/g, '$1$2');

                text = text.replace(/([–ї–Ы])—М([–Ї–љ—В–Ъ–Э–Ґ])([–∞–Њ—Г—Л—Н–Р–Ю–£–Ђ–≠])/g, '$1$2$3');
                text = text.replace(/([–І—З])([–∞])([—А])—М([–Ї])/g, '$1$2$3$4');

                text = text.replace(/([—Л—Н–Є–є–µ—М—Ц”Х‘Щ”У—£–Ђ–≠–Ш–Щ–Х–ђ–Ж”Ф‘Ш”Т—Ґ])([–і–ї–љ—А—В—Ж–Ф–Ы–Э–†–Ґ–¶]+)([—М–ђ])(?![–∞–Њ—Г—Л—Н–Р–Ю–£–Ђ–≠])/g, '$1$2');

                text = text.replace(/([\u0301])/g, '');
                text = text.replace(/(—О[\u0302])/g, '—С');

                text = text.replace(/([–µ])([–Є])([—П])([—Ц])/g, '$1j$2j$3');
                text = text.replace(/([–∞–Њ—Г—Л—Н—П—С—О–Є–µ—К—М—Ц”Х‘Щ”У—£–Р–Ю–£–Ђ–≠–ѓ–Б–Ѓ–Ш–Х–™–ђ–Ж”Ф‘Ш”Т—Ґ])([–µ—С—О—П])/g, '$1j$2');
                text = text.replace(/([–∞–Њ—Г—Л—Н—П—С—О–Є–µ—К—Ц”Х‘Щ”У—£–Р–Ю–£–Ђ–≠–ѓ–Б–Ѓ–Ш–Х–™–Ж”Ф‘Ш”Т—Ґ])([–Є—Ц])/g, '$1j$2');
                text = text.replace(/([–∞–Њ—Г—Л—Н—П—С—О–Є–µ—К”Х‘Щ”У—£–Р–Ю–£–Ђ–≠–ѓ–Б–Ѓ–Ш–Х–™”Ф‘Ш”Т—Ґ])([–є])/g, '$1i');
                text = text.replace(/([–Р–Ю–£–Ђ–≠–ѓ–Б–Ѓ–Ш–Х–™–ђ–Ж”Ф—Ґ])([–Х–Б–Ѓ–ѓ])/g, '$1J$2');
                text = text.replace(/([–Р–Ю–£–Ђ–≠–ѓ–Б–Ѓ–Ш–Х–™–Ж”Ф—Ґ])([–Ш–Ж])/g, '$1J$2');
                text = text.replace(/([–Р–Ю–£–Ђ–≠–ѓ–Б–Ѓ–Ш–Х–™”Ф—Ґ])([–Щ])/g, '$1I');

                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])([–Є—Ц])([–∞–Њ—Г—Л—Н—П—С—О–Є–µ—К—М—Ц”Х])/g, '$1j$3');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])([–Ш–Ж])([–∞–Њ—Г—Л—Н—П—С—О–Є–µ—К—М—Ц”Х])/g, '$1J$3');

                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])([—С—О—П])/g, '$1j$2');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])([–Б–Ѓ–ѓ])/g, '$1J$2');
                text = text.replace(/-([—С—О—П])/g, '-j$1');
                text = text.replace(/-([–Б–Ѓ–ѓ])/g, '-J$1');

                text = text.replace(/([–∞–µ—С–Є–Њ—Г—Л—Н—О—П—М–Р–Х–Б–Ш–Ю–£–Ђ–≠–Ѓ–ѓ–ђ])—Н/g, '$1e')
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])—Н/g, '$1e');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])–≠/g, '$1E');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])—Ц/g, '$1i');
                text = text.replace(/(^|\s|[.,!?;:()\[\]{}<>"вАЬвАЭ¬Ђ¬ївАЮвАЬвА¶\-])–Ж/g, '$1I');

                text = text.replace(/([–±–≤–≥–ґ–Ї–Љ–њ—Д—Е—З—И–С–Т–У–Ц–Ъ–Ь–Я–§–•–І–®])([—П‘Щ])/g, '$1√§');
                text = text.replace(/([–±–≤–≥–ґ–Ї–Љ–њ—Д—Е—З—И–С–Т–У–Ц–Ъ–Ь–Я–§–•–І–®])—С/g, '$1√ґ');
                text = text.replace(/([–і–Ј–ї–љ—А—Б—В—Ж–Ф–Ч–Ы–Э–†–°–Ґ–¶])–µ/g, '$1e');
                text = text.replace(/([–і–Ј–ї–љ—А—Б—В—Ж–Ф–Ч–Ы–Э–†–°–Ґ–¶])–Є/g, '$1i');

                text = text.replace(/([—З—И–І–®])—Л/g, '$1i');

                text = text.replace(/([–С–Т–У–Ц–Ъ–Ь–Я–§–•–І–®–©–±–≤–≥–ґ–Ї–Љ–њ—Д—Е—З—И—Й])—М/g, '$1');
                text = text.replace(/—К/g, '');
                text = text.replace(/(\s|^)—Ц/g, '$1j');

                    text = text.replace(/–Ш/g, 'I');
                    text = text.replace(/–Х/g, 'E');
                    text = text.replace(/([–Ш–Х–Б–Ѓ–ѓ])([^–Р-–ѓ])/g, function (match, p1, p2) {
                        return p1.toLowerCase() + p2;
                    });

                    text = text.replace(/¬Ђ/g, 'вАЮ').replace(/¬ї/g, 'вАЬ');

                    const regexNoVowel = new RegExp(key + '[–ђ—М]', 'g');
                    text = text.replace(regexNoVowel, value);

                    text = text.replace(new RegExp(key + `([${front}])`, 'g'), value + '$1');
                }

                for (const [key, value] of Object.entries(palatals)) {
                    const regexVowel = new RegExp(key + '—Ц([–∞–Є–Њ—Г—Л—Н–Р–Ш–Ю–£–Ђ–≠])', 'g');
                    text = text.replace(regexVowel, value + '$1');
                }

                text = text.trim().split('').map(char => letters[char] || char).join('');
                return (spaceBefore ? ' ' : '') + text + (spaceAfter ? ' ' : '');
            }

            function transliterateNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const original = node.nodeValue;
                    const transliterated = transliterate(original);
                    if (transliterated !== original) {
                        node.nodeValue = transliterated;
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (node.hasAttribute('placeholder')) {
                        const original = node.getAttribute('placeholder');
                        const transliterated = transliterate(original);
                        if (transliterated !== original) {
                            node.setAttribute('placeholder', transliterated);
                        }
                    }

                    if (node.tagName === 'OPTION') {
                        const original = node.textContent;
                        const transliterated = transliterate(original);
                        if (transliterated !== original) {
                            node.textContent = transliterated;
                        }
                    }

                    if (node.tagName === 'INPUT' || node.tagName === 'TEXTAREA') {
                        return;
                    }

                    Array.from(node.childNodes).forEach(transliterateNode);
                }
            }

            function transliteratePage() {
                const container = document.querySelector('.container');
                transliterateNode(container);

                const footer = document.querySelector('footer');
                transliterateNode(footer);
            }

            const originalDisplayEntries = window.displayEntries;
            window.displayEntries = function (entries) {
                if (originalDisplayEntries) {
                    originalDisplayEntries(entries);
                }
                requestAnimationFrame(() => {
                    transliteratePage();
                });
            };

            document.addEventListener('DOMContentLoaded', function () {
                transliteratePage();

                const observer = new MutationObserver(function (mutations) {
                    mutations.forEach(function (mutation) {
                        if (mutation.addedNodes.length) {
                            clearTimeout(window.transliterateTimeout);
                            window.transliterateTimeout = setTimeout(() => {
                                transliteratePage();
                            }, 100);
                        }
                    });
                });

                observer.observe(document.body, {
                    childList: true,
                    subtree: true,
                    characterData: false
                });
            });
        </script>
